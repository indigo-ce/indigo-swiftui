name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-ios:
    name: Test iOS
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install Tuist
        run: mise install

      - name: Install dependencies
        run: tuist install

      - name: Generate project
        run: tuist generate --no-open

      - name: Run tests
        run: tuist test --platform ios
